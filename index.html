<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Giá Pro - Local Auto Image</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- SheetJS (Excel) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,300;1,400&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #f3f4f6; }
        textarea { resize: none; overflow: hidden; min-height: 1.5em; }
        input[type="file"] { display: none; }
        .suggestions-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000; max-height: 300px; overflow-y: auto; }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
        .suggestion-item:hover { background-color: #f3f4f6; }
        .suggestion-price { color: #0284c7; font-weight: bold; float: right; }
        
        /* Ẩn thanh cuộn dọc nhưng vẫn cuộn được cho bảng tính */
        .hide-scrollbar::-webkit-scrollbar { height: 6px; width: 6px;}
        .hide-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .hide-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            body { background-color: white; margin: 0; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .no-print, .ui-control, .fixed-toolbar, .modal-overlay, .toast-noti, .suggestions-list, .delete-col { display: none !important; }
            .print-container { width: 297mm !important; max-width: 297mm !important; margin: 0 !important; padding: 10mm !important; box-shadow: none !important; border: none !important; zoom: 100%; overflow: visible !important; }
            .hide-scrollbar { overflow-x: visible !important; }
            .print-table { min-width: 100% !important; }
            table { page-break-inside: auto; border-collapse: collapse; width: 100%; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            thead { display: table-header-group; }
            tfoot { display: table-footer-group; }
            .bg-sky-600 { background-color: #0284c7 !important; color: white !important; }
            .bg-sky-100 { background-color: #e0f2fe !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Save: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
            Database: ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
            Trash2: ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Plus: ({size=16, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Printer: ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
            Upload: ({size=16, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            RefreshCcw: ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v6h6"/><path d="M21 12A9 9 0 0 0 6 5.3L3 8"/><path d="M21 22v-6h-6"/><path d="M3 12a9 9 0 0 0 15 6.7l3-2.7"/></svg>,
            Edit: ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Eye: ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8-11-8-11-8-11-8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
            Settings: ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
        };

        // --- LOCAL DATABASE HELPER ---
        const DB_KEY = "AQARA_LOCAL_PRODUCTS";
        const localDbHelper = {
            getProducts: () => {
                try {
                    const data = localStorage.getItem(DB_KEY);
                    return data ? JSON.parse(data) : [];
                } catch (e) {
                    console.error("Lỗi đọc dữ liệu máy:", e);
                    return [];
                }
            },
            saveProducts: (products) => {
                try {
                    const validProducts = products.filter(p => p && String(p.TenSP || "").trim() !== "");
                    localStorage.setItem(DB_KEY, JSON.stringify(validProducts));
                    return true;
                } catch (e) {
                    console.error("Lỗi lưu dữ liệu máy:", e);
                    alert("Không thể lưu dữ liệu. Có thể bộ nhớ trình duyệt đã đầy!");
                    return false;
                }
            }
        };

        // --- COMPONENTS ---
        const SmartTextarea = ({ value, onChange, className, style, placeholder }) => {
            const ref = useRef(null);
            useEffect(() => { if (ref.current) { ref.current.style.height = 'auto'; ref.current.style.height = ref.current.scrollHeight + 'px'; } }, [value]);
            return <textarea ref={ref} value={value} onChange={onChange} className={className} style={{...style, height: 'auto', minHeight: '1.5em'}} placeholder={placeholder} rows={1} />;
        };

        // QUẢN LÝ SẢN PHẨM LOCAL
        const ProductManager = ({ isOpen, onClose, dbProducts, onReload }) => {
            const [editableProducts, setEditableProducts] = useState([]);
            const [hasChanges, setHasChanges] = useState(false);
            const [uploading, setUploading] = useState(false);

            useEffect(() => {
                if (isOpen) {
                    setEditableProducts([...dbProducts]);
                    setHasChanges(false);
                }
            }, [isOpen, dbProducts]);

            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const workbook = XLSX.read(bstr, { type: 'binary' });
                        const wsname = workbook.SheetNames[0];
                        const jsonDataRaw = XLSX.utils.sheet_to_json(workbook.Sheets[wsname], { header: 1, defval: "" });
                        
                        let headerRowIndex = -1;
                        let headers = [];

                        for (let i = 0; i < Math.min(20, jsonDataRaw.length); i++) {
                            const row = jsonDataRaw[i];
                            if (!row || !Array.isArray(row)) continue;
                            const rowString = row.join("").toLowerCase();
                            if (rowString.includes('tên') || rowString.includes('ten') || rowString.includes('giá') || rowString.includes('gia') || rowString.includes('mô tả')) {
                                headerRowIndex = i;
                                headers = row.map(h => String(h || "").trim());
                                break;
                            }
                        }

                        if (headerRowIndex === -1) {
                            alert("LỖI ĐỌC FILE: Không tìm thấy dòng Tiêu đề. Vui lòng kiểm tra lại file!");
                            setUploading(false); return;
                        }

                        const jsonData = [];
                        for (let i = headerRowIndex + 1; i < jsonDataRaw.length; i++) {
                            const rowData = jsonDataRaw[i];
                            if (!rowData || rowData.every(cell => !cell || cell === "")) continue; 
                            let obj = {};
                            headers.forEach((header, index) => { if (header) obj[header] = rowData[index]; });
                            jsonData.push(obj);
                        }

                        const getColumnName = (obj, possibilities) => {
                            const keys = Object.keys(obj);
                            for (let p of possibilities) {
                                const exactMatch = keys.find(k => k.toLowerCase() === p.toLowerCase());
                                if (exactMatch) return exactMatch;
                            }
                            for (let key of keys) { 
                                const k = key.toLowerCase(); 
                                for (let p of possibilities) if (k.includes(p.toLowerCase())) return key; 
                            }
                            return null;
                        };

                        const normalizedData = jsonData.map((item) => {
                            const nameKey = getColumnName(item, ['Tên SP', 'Ten SP', 'Tên sản phẩm', 'TenSP', 'Tên', 'Ten', 'Name', 'Model']);
                            const descKey = getColumnName(item, ['Mô tả', 'MoTa', 'Description', 'Thông số', 'Thông tin', 'Diễn giải']);
                            const brandKey = getColumnName(item, ['Hãng', 'Hang', 'Thương hiệu', 'Brand']);
                            const warKey = getColumnName(item, ['Bảo hành', 'BaoHanh', 'BH', 'Warranty']);
                            const unitKey = getColumnName(item, ['ĐVT', 'DVT', 'Đơn vị', 'Unit']);
                            // Bắt thêm cột Mã SP để auto lấy ảnh
                            const codeKey = getColumnName(item, ['Mã SP', 'Ma SP', 'Mã sản phẩm', 'Mã', 'SKU', 'Code', 'Model']);
                            let priceKey = Object.keys(item).find(k => k.toLowerCase().includes('giá') || k.toLowerCase().includes('gia') || k.toLowerCase().includes('price') || k.toLowerCase().includes('đơn giá'));

                            if (!nameKey || !item[nameKey]) return null;

                            let rawPrice = item[priceKey];
                            let parsedPrice = 0;
                            if (typeof rawPrice === 'number') { parsedPrice = rawPrice; } 
                            else if (rawPrice) { parsedPrice = parseInt(String(rawPrice).replace(/[^0-9]/g, ''), 10) || 0; }

                            return {
                                id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
                                MaSP: String(codeKey && item[codeKey] ? item[codeKey] : '').trim(), // Lưu thêm mã SP
                                TenSP: String(item[nameKey] || 'SP Chưa Tên').trim(),
                                MoTa: String(item[descKey] || '').trim(),
                                Hang: String(item[brandKey] || '').trim(),
                                BaoHanh: String(item[warKey] || '12').trim(),
                                DVT: String(item[unitKey] || 'Cái').trim(),
                                Gia: parsedPrice
                            };
                        }).filter(i => i !== null);

                        if(normalizedData.length === 0) {
                            alert("Đã đọc được file Excel nhưng không chắt lọc được sản phẩm nào. Cột 'Tên SP' có thể đang bị trống dữ liệu!");
                        } else {
                            setEditableProducts([...normalizedData, ...editableProducts]);
                            setHasChanges(true);
                            alert(`Đã nạp ${normalizedData.length} sản phẩm từ Excel! Anh NHỚ BẤM LƯU để lưu vào máy nhé.`);
                        }
                    } catch (err) { 
                        console.error("Lỗi code:", err); alert("Lỗi khi đọc file Excel!");
                    } finally { 
                        setUploading(false); e.target.value = null; 
                    }
                };
                reader.readAsBinaryString(file);
            };

            const handleFieldChange = (index, field, value) => {
                const updated = [...editableProducts];
                updated[index][field] = value;
                setEditableProducts(updated);
                setHasChanges(true);
            };

            const handleAddBlankProduct = () => {
                const newProd = {
                    id: Date.now().toString(),
                    MaSP: "",
                    TenSP: "Sản phẩm mới",
                    MoTa: "",
                    Hang: "",
                    BaoHanh: "12",
                    DVT: "Cái",
                    Gia: 0
                };
                setEditableProducts([newProd, ...editableProducts]); // Thêm lên đầu
                setHasChanges(true);
            };

            const handleDeleteRow = (index) => {
                if(confirm("Xóa sản phẩm này khỏi danh sách?")) {
                    const updated = [...editableProducts];
                    updated.splice(index, 1);
                    setEditableProducts(updated);
                    setHasChanges(true);
                }
            };

            const handleClearAll = () => {
                if(confirm("⚠️ CẢNH BÁO: Anh có chắc chắn muốn XÓA SẠCH toàn bộ sản phẩm trong kho không?\n\n(Lưu ý: Sau khi xóa, anh cần bấm nút 'LƯU THAY ĐỔI' để chính thức xóa khỏi máy tính)")) {
                    setEditableProducts([]);
                    setHasChanges(true);
                }
            };

            const handleSaveAll = () => {
                if (localDbHelper.saveProducts(editableProducts)) {
                    setHasChanges(false);
                    alert("Đã lưu danh sách sản phẩm thành công vào bộ nhớ máy tính!");
                    onReload(); // Cập nhật lại app ngoài
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[200] p-2 sm:p-4">
                    <div className="bg-white rounded-lg shadow-xl w-full max-w-6xl h-[90vh] md:h-[85vh] flex flex-col overflow-hidden border border-gray-200">
                        {/* Header Modal */}
                        <div className="p-3 md:p-4 border-b flex justify-between items-center bg-gray-50 shadow-sm relative z-10">
                            <div>
                                <h3 className="text-base md:text-lg font-bold flex items-center gap-2 text-gray-800">
                                    <Icons.Database /> Kho Sản Phẩm (Lưu trên máy)
                                </h3>
                                <p className="text-xs text-gray-500 mt-1">Sửa trực tiếp các ô bên dưới. Dữ liệu siêu tốc không cần mạng.</p>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={onClose} className="text-gray-400 hover:text-gray-800 p-1 rounded-full hover:bg-gray-200 transition-colors">✕</button>
                            </div>
                        </div>
                        
                        {/* Toolbar Modal */}
                        <div className="p-3 md:p-4 bg-sky-50 border-b border-sky-100 flex flex-wrap gap-3 items-center justify-between shadow-inner relative z-10">
                            <div className="flex flex-wrap gap-2">
                                <label className={`flex items-center justify-center gap-2 px-3 md:px-4 py-2 text-xs md:text-sm text-white rounded shadow transition-colors w-full sm:w-auto ${uploading ? 'bg-orange-500 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 cursor-pointer'}`}>
                                    <Icons.Upload size={14}/> {uploading ? "Đang đọc..." : "Nạp từ Excel"}
                                    <input type="file" accept=".xlsx, .xls" onChange={handleExcelUpload} disabled={uploading} className="hidden"/>
                                </label>
                                <button onClick={handleAddBlankProduct} className="flex items-center gap-2 px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs md:text-sm rounded shadow transition-colors w-full sm:w-auto justify-center">
                                    <Icons.Plus size={14}/> Thêm thủ công
                                </button>
                                <button onClick={handleClearAll} className="flex items-center gap-2 px-3 py-2 bg-red-500 hover:bg-red-600 text-white text-xs md:text-sm rounded shadow transition-colors w-full sm:w-auto justify-center" title="Xóa toàn bộ để nạp file mới">
                                    <Icons.Trash2 size={14}/> Xóa tất cả
                                </button>
                            </div>

                            <div className="flex items-center gap-3 w-full lg:w-auto mt-2 lg:mt-0">
                                <span className="text-xs text-gray-600 font-medium whitespace-nowrap">Tổng: {editableProducts.length} SP</span>
                                <button 
                                    onClick={handleSaveAll} 
                                    className={`flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 text-sm text-white rounded shadow-md transition-all ${hasChanges ? 'bg-orange-600 hover:bg-orange-700 animate-pulse ring-2 ring-orange-400 ring-offset-2' : 'bg-sky-600 hover:bg-sky-700 opacity-90'}`}
                                >
                                    <Icons.Save size={16}/> {hasChanges ? 'LƯU THAY ĐỔI NGAY' : 'Đã Lưu'}
                                </button>
                            </div>
                        </div>

                        {/* Table Area */}
                        <div className="flex-1 overflow-x-auto overflow-y-auto bg-gray-50 hide-scrollbar relative">
                            <table className="w-full min-w-[800px] border-collapse text-xs md:text-sm bg-white shadow-sm">
                                <thead className="bg-gray-200 sticky top-0 shadow-sm z-20">
                                    <tr>
                                        <th className="border-b p-2 md:p-3 text-left w-10 text-gray-600">#</th>
                                        <th className="border-b border-l p-2 md:p-3 text-left w-24 text-gray-600" title="Đặt mã SP để tool tự động gọi ảnh trên GitHub">Mã SP</th>
                                        <th className="border-b border-l p-2 md:p-3 text-left text-gray-600">Tên Sản Phẩm</th>
                                        <th className="border-b border-l p-2 md:p-3 text-left w-32 text-gray-600">Giá Bán</th>
                                        <th className="border-b border-l p-2 md:p-3 text-left w-20 text-gray-600">ĐVT</th>
                                        <th className="border-b border-l p-2 md:p-3 text-left w-28 text-gray-600">Hãng</th>
                                        <th className="border-b border-l p-2 md:p-3 text-left w-16 text-gray-600">BH(T)</th>
                                        <th className="border-b border-l p-2 md:p-3 w-12 md:w-16 text-center text-gray-600">Xóa</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {editableProducts.length === 0 && (
                                        <tr><td colSpan="8" className="text-center p-12 text-gray-400 text-base">Kho trống. Hãy nạp file Excel hoặc Thêm thủ công.</td></tr>
                                    )}
                                    {editableProducts.map((p, idx) => (
                                        <tr key={idx} className="hover:bg-sky-50 transition-colors border-b border-gray-100 group">
                                            <td className="p-2 text-center text-gray-400">{idx + 1}</td>
                                            <td className="p-1 border-l border-gray-100">
                                                <input 
                                                    type="text" 
                                                    value={p.MaSP || ''} 
                                                    onChange={(e) => handleFieldChange(idx, 'MaSP', e.target.value)}
                                                    className="w-full px-2 py-1.5 bg-sky-50/50 border border-transparent focus:border-sky-400 focus:bg-white focus:ring-1 ring-sky-200 outline-none rounded font-bold text-sky-800 transition-all uppercase"
                                                    placeholder="VD: M1S"
                                                />
                                            </td>
                                            <td className="p-1 border-l border-gray-100">
                                                <input 
                                                    type="text" 
                                                    value={p.TenSP} 
                                                    onChange={(e) => handleFieldChange(idx, 'TenSP', e.target.value)}
                                                    className="w-full px-2 py-1.5 bg-transparent border border-transparent focus:border-sky-400 focus:bg-white focus:ring-1 ring-sky-200 outline-none rounded font-medium text-gray-800 transition-all"
                                                    placeholder="Tên sản phẩm..."
                                                />
                                            </td>
                                            <td className="p-1 border-l border-gray-100 relative">
                                                <input 
                                                    type="number" 
                                                    value={p.Gia} 
                                                    onChange={(e) => handleFieldChange(idx, 'Gia', parseInt(e.target.value) || 0)}
                                                    className="w-full px-2 py-1.5 bg-transparent border border-transparent focus:border-sky-400 focus:bg-white focus:ring-1 ring-sky-200 outline-none rounded font-bold text-sky-600 text-right transition-all pr-5"
                                                />
                                                <span className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-[10px]">đ</span>
                                            </td>
                                            <td className="p-1 border-l border-gray-100">
                                                <input 
                                                    type="text" 
                                                    value={p.DVT} 
                                                    onChange={(e) => handleFieldChange(idx, 'DVT', e.target.value)}

                                                />
                                            </td>
                                            <td className="p-1 border-l border-gray-100">
                                                <input 
                                                    type="text" 
                                                    value={p.Hang} 
                                                    onChange={(e) => handleFieldChange(idx, 'Hang', e.target.value)}
                                                    className="w-full px-2 py-1.5 bg-transparent border border-transparent focus:border-sky-400 focus:bg-white focus:ring-1 ring-sky-200 outline-none rounded text-center uppercase transition-all text-gray-600"
                                                />
                                            </td>
                                            <td className="p-1 border-l border-gray-100">
                                                <input 
                                                    type="text" 
                                                    value={p.BaoHanh} 
                                                    onChange={(e) => handleFieldChange(idx, 'BaoHanh', e.target.value)}

                                                />
                                            </td>
                                            <td className="p-1 border-l border-gray-100 text-center">
                                                <button onClick={() => handleDeleteRow(idx)} className="text-red-400 hover:text-red-600 hover:bg-red-50 p-1.5 rounded transition-colors" title="Xóa dòng này">

                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const ProductAutocomplete = ({ value, onChange, onSelectProduct, dbProducts, isPreviewMode, placeholder, className, style }) => {
            const [suggestions, setSuggestions] = useState([]);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const wrapperRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setShowSuggestions(false); };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const handleInputChange = (e) => {
                const text = e.target.value;
                onChange(e);
                if (text.length > 0 && dbProducts.length > 0) {
                    const lowerText = text.toLowerCase();
                    // Tìm theo Tên hoặc Mã SP
                    const filtered = dbProducts.filter(p => 
                        (p.TenSP && String(p.TenSP).toLowerCase().includes(lowerText)) ||
                        (p.MaSP && String(p.MaSP).toLowerCase().includes(lowerText))
                    ).slice(0, 15);
                    setSuggestions(filtered);
                    setShowSuggestions(true);
                } else { setShowSuggestions(false); }
            };

            const handleSelectSuggestion = (item) => { onSelectProduct(item); setShowSuggestions(false); };

            if (isPreviewMode) return <div className={`${className} whitespace-pre-wrap`} style={style}>{value}</div>;

            return (
                <div className="relative w-full" ref={wrapperRef}>
                    <SmartTextarea value={value} onChange={handleInputChange} className={`bg-sky-50/30 hover:bg-sky-50 focus:bg-white focus:ring-1 ring-sky-300 outline-none w-full transition-colors ${className}`} style={style} placeholder={placeholder} />
                    {showSuggestions && suggestions.length > 0 && (
                        <div className="suggestions-list shadow-2xl border-sky-200">
                            {suggestions.map((item, idx) => (
                                <div key={idx} className="suggestion-item hover:bg-sky-50 border-b border-gray-100 last:border-0" onClick={() => handleSelectSuggestion(item)}>
                                    <div className="font-bold text-gray-800">
                                        {item.MaSP && <span className="text-sky-600 mr-1 text-xs">[{item.MaSP}]</span>}
                                        {item.TenSP}
                                    </div>
                                    <div className="text-gray-500 flex justify-between mt-1 text-[10px] md:text-xs">
                                        <span className="bg-gray-100 px-1 rounded font-medium">{item.Hang || 'N/A'}</span>
                                        <span className="suggestion-price text-sky-600">{new Intl.NumberFormat('vi-VN').format(item.Gia || 0)} đ</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // --- MAIN APP ---
        const QuoteTool = () => {
            const [isPreviewMode, setIsPreviewMode] = useState(false);
            const [dbProducts, setDbProducts] = useState([]);
            const [showProductManager, setShowProductManager] = useState(false);
            const [data, setData] = useState({
                fileName: "Báo giá mới",
                projectTitle: "BÁO GIÁ_Smart Home",
                companyInfo: { logo: null, name: "Aqara Smarthome", subName: "Giải pháp chiếu sáng chuyên nghiệp và thông minh toàn diện", address: "truongdino4@gmail.com", website: "Trường Otiz", hotline: "0363035960" },
                customerInfo: { companyName: "CÔNG TY TNHH TƯ VẤN THIẾT KẾ VÀ XÂY DỰNG NGUYÊN KHÁNH", mst: "316419615", address: "L18-11-13, Tầng 18, Tòa nhà Vincom Center Đồng Khởi, 72 Lê Thánh Tôn, P. Bến Nghé, Q.1, TP.HCM", contactName: "Anh Khánh", phone: "0911981618", quoteDate: new Date().toISOString().split('T')[0] },
                items: [{ id: 1, title: "(I) BỘ ĐIỀU KHIỂN TRUNG TÂM + ĐIỀU HÒA", products: [{ id: 101, MaSP: "", name: "Bộ điều khiển trung tâm Camera Hub G3", description: "", image: null, brand: "AQARA", warranty: 18, qty: 1, unit: "Bộ", price: 3299000 }] }],
                financials: { discountType: 'amount', discountValue: 0, installationType: 'amount', installationValue: 11000000 },
                paymentInfo: { show: false, title: "Tài khoản cá nhân:", stk: "STK: ... - Ngân hàng", ctk: "CTK: Trường Otiz" },
                serviceInfo: { show: true, title1: "(1) Phí lắp đặt bao gồm:", desc1: "- Thi công phần cứng toàn bộ hệ thống Smarthome.\n- Không bao gồm chi phí kéo dây điện, đục tường.", title2: "(2) Phí dịch vụ bao gồm:", desc2: "- Bảo hành tận nơi theo thời gian bảo hành sản phẩm.\n- Kết nối toàn bộ hệ thống.\n- Thiết kế hệ thống, Cấu hình tự động hóa.\n- Chia phòng, đặt tên thiết bị, cấu hình tự động.\n- Hướng dẫn khách hàng thao tác sử dụng." }

            // Tải dữ liệu từ LocalStorage khi khởi động
            const reloadProducts = () => {

            const handleFileUpload = (e, callback) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onloadend = () => callback(reader.result); reader.readAsDataURL(file); } };
            
            // Xử lý Autofill kèm Mã SP để lấy ảnh
            const handleAutoFillProduct = (catIdx, prodIdx, productData) => {
                const newData = {...data}; const prod = newData.items[catIdx].products[prodIdx];
                prod.name = productData.TenSP; 
                prod.MaSP = productData.MaSP; // Nhận mã SP để hệ thống tự gọi ảnh
                prod.description = productData.MoTa || ''; 
                prod.brand = productData.Hang || ''; 
                prod.warranty = productData.BaoHanh || '12'; 
                prod.unit = productData.DVT || 'Cái'; 
                prod.price = parseFloat(productData.Gia) || 0;
                setData(newData);
            };
            
            const calculateTotal = () => {
                let subtotal = 0; data.items.forEach(c => c.products.forEach(p => subtotal += p.qty * p.price));
                let discount = data.financials.discountType === 'percent' ? (subtotal * data.financials.discountValue) / 100 : data.financials.discountValue;
                let install = data.financials.installationType === 'percent' ? (subtotal * data.financials.installationValue) / 100 : data.financials.installationValue;
                return { subtotal, discount, install, total: (subtotal - discount) + install };
            };
            const totals = calculateTotal();
            const formatCurrency = (amt) => new Intl.NumberFormat('vi-VN').format(Math.round(amt));
            const handlePrint = () => { if (!isPreviewMode) { setIsPreviewMode(true); setTimeout(() => { document.title = data.fileName; window.print(); }, 500); } else { document.title = data.fileName; window.print(); } };
            const updateItem = (catIdx, prodIdx, field, val) => { const newData = {...data}; newData.items[catIdx].products[prodIdx][field] = val; setData(newData); };
            const addCategory = () => { const newData = {...data}; newData.items.push({ id: Date.now(), title: "(...) HẠNG MỤC MỚI", products: [] }); setData(newData); };

            const removeCategory = (catIdx) => { if(confirm("Xóa mục này?")) { const newData = {...data}; newData.items.splice(catIdx, 1); setData(newData); } };
            const removeProduct = (catIdx, prodIdx) => { if(confirm("Xóa SP này?")) { const newData = {...data}; newData.items[catIdx].products.splice(prodIdx, 1); setData(newData); } };

            const renderEditable = (value, onChange, placeholder, className, isArea = false, style = {}) => {
                if (isPreviewMode) return <div className={`${className} whitespace-pre-wrap`} style={style}>{value}</div>;

                return <input value={value} onChange={onChange} className={`bg-sky-50/30 hover:bg-sky-50 focus:bg-white focus:ring-1 ring-sky-300 outline-none w-full transition-colors ${className}`} placeholder={placeholder} style={style} />;
            };

            return (
                <div className="min-h-screen px-2 py-4 md:p-4 pb-24 bg-gray-100">
                    <ProductManager isOpen={showProductManager} onClose={() => setShowProductManager(false)} dbProducts={dbProducts} onReload={reloadProducts} />

                        <div className="flex flex-wrap items-center gap-2 md:gap-4 w-full sm:w-auto justify-center sm:justify-start">
                            <div className="font-bold text-sky-600 text-sm md:text-lg flex items-center gap-1 md:gap-2 whitespace-nowrap"><Icons.Database /> Báo Giá Mượt Mà</div>
                            <input value={data.fileName} onChange={(e) => setData({...data, fileName: e.target.value})} className="border-b border-gray-300 focus:border-sky-500 outline-none px-2 py-1 w-full max-w-[180px] sm:max-w-xs md:w-64 bg-transparent text-sm md:text-base text-center sm:text-left" placeholder="Tên file lưu..." />
                        </div>
                        <div className="flex flex-wrap justify-center gap-2 w-full sm:w-auto">
                            <button onClick={() => setShowProductManager(true)} className="flex items-center gap-1 md:gap-2 px-2 md:px-3 py-1.5 md:py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded shadow-sm font-medium text-xs md:text-sm">

                            </button>
                            <button onClick={() => setIsPreviewMode(!isPreviewMode)} className={`flex items-center gap-1 md:gap-2 px-3 md:px-4 py-1.5 md:py-2 text-white rounded shadow-sm font-medium transition-colors text-xs md:text-sm ${isPreviewMode ? 'bg-sky-600 hover:bg-sky-700' : 'bg-gray-600 hover:bg-gray-700'}`}>{isPreviewMode ? <><Icons.Edit size={14}/> Sửa</> : <><Icons.Eye size={14}/> Xem</>}</button>

                            {/* HEADER: Khóa chặt form nằm ngang tuyệt đối khi ở chế độ IN/XEM */}

                                    {renderEditable(data.companyInfo.subName, (e) => setData({...data, companyInfo: {...data.companyInfo, subName: e.target.value}}), "Mô tả phụ", isPreviewMode ? "text-sm italic text-gray-600 text-left mb-0 w-full" : "text-xs md:text-sm italic text-gray-600 text-center md:text-left mb-2 md:mb-0 w-full")}

                                        <div className={`flex w-full ${isPreviewMode ? 'justify-start' : 'justify-center md:justify-start'}`}><strong className={`shrink-0 text-left ${isPreviewMode ? 'w-24' : 'w-16 md:w-24'}`}>Email:</strong>{renderEditable(data.companyInfo.address, (e) => setData({...data, companyInfo: {...data.companyInfo, address: e.target.value}}), "", "flex-1")}</div>

                                    </div>
                                </div>
                            </div>

                            <div className={`flex ${isPreviewMode ? 'flex-row justify-between items-end mb-6' : 'flex-col sm:flex-row justify-between items-center sm:items-end mb-4 md:mb-6 gap-2'}`}>

                                        <div className={`flex items-center w-full ${isPreviewMode ? 'w-1/2 pr-2' : 'min-[400px]:w-1/2 min-[400px]:pr-2'}`}><span className={`font-bold text-sky-700 shrink-0 ${isPreviewMode ? 'w-16' : 'w-20 min-[400px]:w-16'}`}>SĐT:</span>{renderEditable(data.customerInfo.phone, (e) => setData({...data, customerInfo: {...data.customerInfo, phone: e.target.value}}), "", "flex-1 bg-transparent")}</div>
                                        <div className={`flex items-center w-full ${isPreviewMode ? 'w-1/2 pl-2' : 'min-[400px]:w-1/2 min-[400px]:pl-2'}`}><span className={`font-bold text-sky-700 shrink-0 ${isPreviewMode ? 'w-12' : 'w-20 min-[400px]:w-12'}`}>MST:</span>{renderEditable(data.customerInfo.mst, (e) => setData({...data, customerInfo: {...data.customerInfo, mst: e.target.value}}), "", "flex-1 bg-transparent")}</div>

                            <div className="mb-4 text-[10px] md:text-xs italic text-gray-600 text-justify">Aqara Smarthome xin chân thành cảm ơn Quý Khách đã quan tâm đến sản phẩm của chúng tôi, phúc đáp theo yêu cầu của Quý Khách chúng tôi xin gửi bảng báo giá như sau:</div>

                                                            <div className={`w-14 h-14 md:w-20 md:h-20 flex justify-center mx-auto ${isPreviewMode ? '' : 'bg-gray-50 border border-gray-100 rounded'} relative group/imgbox`}>
                                                                <label className="cursor-pointer w-full h-full flex justify-center overflow-hidden items-center relative">
                                                                    <input type="file" disabled={isPreviewMode} onChange={(e) => handleFileUpload(e, (b64) => updateItem(catIdx, pIdx, 'image', b64))} className="hidden" />
                                                                    
                                                                    {/* 1. Nếu có ảnh up tay bằng máy tính -> Hiển thị nó */}
                                                                    {p.image ? (
                                                                        <img src={p.image} className="w-full h-full object-contain relative z-20 bg-white" />
                                                                    ) : (
                                                                        <React.Fragment>
                                                                            {/* 2. Nếu không có ảnh up tay mà có mã SP -> Tự động gọi ảnh từ thư mục /images/ trên GitHub */}
                                                                            {p.MaSP && (
                                                                                <img
                                                                                    src={`./images/${p.MaSP}.jpg`}
                                                                                    className="w-full h-full object-contain absolute inset-0 z-10 bg-white"
                                                                                    onError={(e) => { e.target.style.display = 'none'; }}
                                                                                    title={`Tự động lấy ảnh: ./images/${p.MaSP}.jpg`}
                                                                                />
                                                                            )}
                                                                            {/* 3. Nút Upload nằm dưới cùng, sẽ hiện ra nếu ảnh tự động bị lỗi hoặc hover vào để đổi ảnh */}
                                                                            {!isPreviewMode && (
                                                                                <div className={`text-gray-400 flex flex-col items-center justify-center ui-control absolute inset-0 z-0 transition-opacity ${p.MaSP ? 'opacity-0 group-hover/imgbox:opacity-100 bg-white/80 z-30' : ''}`}>
                                                                                    <Icons.Upload size={16} className="mb-1" />
                                                                                    <span className="text-[8px] md:text-[10px] text-center px-1 leading-tight">{p.MaSP ? 'Đổi ảnh' : 'Tải ảnh'}</span>
                                                                                </div>
                                                                            )}
                                                                        </React.Fragment>
                                                                    )}
                                                                </label>
                                                            </div>
                                                        </td>

                                                        <td className="px-2 pt-1 align-top relative">
                                                            <ProductAutocomplete value={p.name} onChange={(e) => updateItem(catIdx, pIdx, 'name', e.target.value)} onSelectProduct={(prodData) => handleAutoFillProduct(catIdx, pIdx, prodData)} dbProducts={dbProducts} isPreviewMode={isPreviewMode} placeholder="Nhập tên sản phẩm..." className="font-bold text-gray-800 text-[11px] md:text-xs" />
                                                            {renderEditable(p.description, (e) => updateItem(catIdx, pIdx, 'description', e.target.value), "Mô tả chi tiết...", "text-gray-500 text-[9px] md:text-[10px] mt-1 text-justify", true)}
                                                        </td>
                                                        <td className="px-1 pt-2 align-top w-12 md:w-20">{renderEditable(p.brand, (e) => updateItem(catIdx, pIdx, 'brand', e.target.value), "", "text-center uppercase font-semibold text-[10px] md:text-[11px]")}</td>
                                                        <td className="text-center pt-2 align-top w-8 md:w-16">{renderEditable(p.warranty, (e) => updateItem(catIdx, pIdx, 'warranty', e.target.value), "", "text-center text-[10px] md:text-[11px]")}</td>
                                                        <td className="text-center pt-2 align-top w-8 md:w-14">{renderEditable(p.qty, (e) => updateItem(catIdx, pIdx, 'qty', parseInt(e.target.value)||0), "0", "text-center font-bold text-[10px] md:text-[11px]")}</td>
                                                        <td className="text-center pt-2 align-top w-10 md:w-16">{renderEditable(p.unit, (e) => updateItem(catIdx, pIdx, 'unit', e.target.value), "", "text-center text-[10px] md:text-[11px]")}</td>
                                                        <td className="text-right px-1 md:px-2 font-medium pt-2 align-top w-20 md:w-28">{renderEditable(formatCurrency(p.price), (e) => updateItem(catIdx, pIdx, 'price', parseInt(e.target.value.replace(/[^0-9]/g,''))||0), "0", "text-right text-[10px] md:text-[11px]")}</td>
                                                        <td className="text-right px-1 md:px-2 font-bold text-sky-800 pt-2 align-top text-[10px] md:text-[11px] w-24 md:w-28">{formatCurrency(p.qty * p.price)}</td>
                                                        {!isPreviewMode && <td className="text-center pt-2 align-top w-8 md:w-10 delete-col bg-gray-50 border-gray-200"><button onClick={() => removeProduct(catIdx, pIdx)} className="text-red-400 hover:text-red-600 p-1 rounded transition-colors"><Icons.Trash2 size={14}/></button></td>}
                                                    </tr>
                                                ))}
                                            </React.Fragment>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            
                            {!isPreviewMode && <div className="ui-control mt-2 mb-6 text-center"><button onClick={addCategory} className="border border-dashed border-sky-400 text-sky-600 px-4 py-2 rounded text-xs md:text-sm hover:bg-sky-50 shadow-sm w-full md:w-auto"><Icons.Plus size={14} className="inline mr-1"/> Thêm Hạng Mục (Nhóm) Mới</button></div>}
                            
                            {/* FOOTER: Ép cứng form dọc nằm ngang khi IN */}
                            <div className={`flex break-inside-avoid border-t border-gray-200 ${isPreviewMode ? 'flex-row mt-4 pt-4 gap-8' : 'flex-col md:flex-row mt-4 pt-4 gap-6 md:gap-8'}`}>
                                {/* Cột Điều khoản & Thanh toán */}
                                <div className={`w-full flex text-gray-600 ${isPreviewMode ? 'w-1/2 flex-col gap-4 text-xs order-1' : 'md:w-1/2 flex-col sm:flex-row md:flex-col lg:flex-row gap-4 text-[10px] md:text-xs order-2 md:order-1'}`}>
                                    
                                    {/* Khối Phí lắp đặt & Dịch vụ */}
                                    <div className={`flex-1 relative group rounded-lg ${isPreviewMode ? 'bg-transparent p-0' : 'bg-gray-50 md:bg-transparent p-3 md:p-0'}`}>
                                        {!isPreviewMode && (
                                            <div className="absolute right-2 md:-left-6 top-2 md:top-0 ui-control flex items-center bg-white md:bg-transparent p-1 rounded border md:border-none shadow-sm md:shadow-none z-10">
                                                <input 
                                                    type="checkbox" 
                                                    checked={data.serviceInfo?.show ?? true} 
                                                    onChange={(e) => setData({...data, serviceInfo: {...data.serviceInfo, show: e.target.checked}})}
                                                    className="w-4 h-4 cursor-pointer accent-sky-600"
                                                    title="Hiển thị/Ẩn thông tin dịch vụ"
                                                />
                                            </div>
                                        )}
                                        {((data.serviceInfo?.show !== false) || !isPreviewMode) && (
                                            <div className={(!data.serviceInfo?.show && !isPreviewMode) ? 'opacity-40' : ''}>
                                                <div className="mb-2">
                                                    {renderEditable(data.serviceInfo?.title1 || "(1) Phí lắp đặt bao gồm:", (e) => setData({...data, serviceInfo: {...data.serviceInfo, title1: e.target.value}}), "Tiêu đề 1", "font-bold text-sky-700 mb-1 w-full bg-transparent")}
                                                    {renderEditable(data.serviceInfo?.desc1 || "- Thi công phần cứng toàn bộ hệ thống Smarthome.\n- Không bao gồm chi phí kéo dây điện, đục tường.", (e) => setData({...data, serviceInfo: {...data.serviceInfo, desc1: e.target.value}}), "Mô tả phí lắp đặt...", "w-full bg-transparent text-gray-600 leading-relaxed", true)}
                                                </div>
                                                <div>
                                                    {renderEditable(data.serviceInfo?.title2 || "(2) Phí dịch vụ bao gồm:", (e) => setData({...data, serviceInfo: {...data.serviceInfo, title2: e.target.value}}), "Tiêu đề 2", "font-bold text-sky-700 mb-1 mt-2 w-full bg-transparent")}
                                                    {renderEditable(data.serviceInfo?.desc2 || "- Bảo hành tận nơi theo thời gian bảo hành sản phẩm.\n- Kết nối toàn bộ hệ thống.\n- Thiết kế hệ thống, Cấu hình tự động hóa.\n- Chia phòng, đặt tên thiết bị, cấu hình tự động.\n- Hướng dẫn khách hàng thao tác sử dụng.", (e) => setData({...data, serviceInfo: {...data.serviceInfo, desc2: e.target.value}}), "Mô tả phí dịch vụ...", "w-full bg-transparent text-gray-600 leading-relaxed", true)}
                                                </div>
                                                {!isPreviewMode && !data.serviceInfo?.show && <div className="text-red-500 font-medium mt-2 text-[10px] ui-control bg-red-50 p-1 rounded inline-block">Đang ẩn (Tích vào ô vuông để hiện khi in)</div>}
                                            </div>
                                        )}
                                    </div>

                                    {/* Khối Thông tin thanh toán */}
                                    <div className={`flex-1 relative group rounded-lg ${isPreviewMode ? 'mt-4 bg-transparent p-0' : 'mt-4 sm:mt-0 md:mt-4 lg:mt-0 bg-gray-50 md:bg-transparent p-3 md:p-0'}`}>
                                        {!isPreviewMode && (
                                            <div className="absolute right-2 md:-left-6 top-2 md:top-0 ui-control flex items-center bg-white md:bg-transparent p-1 rounded border md:border-none shadow-sm md:shadow-none z-10">
                                                <input 
                                                    type="checkbox" 
                                                    checked={data.paymentInfo?.show ?? false} 
                                                    onChange={(e) => setData({...data, paymentInfo: {...data.paymentInfo, show: e.target.checked}})}
                                                    className="w-4 h-4 cursor-pointer accent-sky-600"
                                                    title="Hiển thị/Ẩn thông tin thanh toán"
                                                />
                                            </div>
                                        )}
                                        {((data.paymentInfo?.show) || !isPreviewMode) && (
                                            <div className={(!data.paymentInfo?.show && !isPreviewMode) ? 'opacity-40' : ''}>
                                                <h3 className={`font-bold text-sky-700 mb-1 ${isPreviewMode ? 'pr-0' : 'pr-6 md:pr-0'}`}>THÔNG TIN THANH TOÁN:</h3>
                                                <div className="space-y-1">
                                                    <p className="font-bold text-black">{renderEditable(data.paymentInfo?.title || "Tài khoản cá nhân:", (e) => setData({...data, paymentInfo: {...data.paymentInfo, title: e.target.value}}), "Tiêu đề", "font-bold text-black w-full bg-transparent")}</p>
                                                    <p>{renderEditable(data.paymentInfo?.stk || "STK: ...", (e) => setData({...data, paymentInfo: {...data.paymentInfo, stk: e.target.value}}), "Số tài khoản", "w-full bg-transparent")}</p>
                                                    <p>{renderEditable(data.paymentInfo?.ctk || "CTK: ...", (e) => setData({...data, paymentInfo: {...data.paymentInfo, ctk: e.target.value}}), "Chủ tài khoản", "w-full bg-transparent")}</p>
                                                </div>
                                                {!isPreviewMode && !data.paymentInfo?.show && <div className="text-red-500 font-medium mt-2 text-[10px] ui-control bg-red-50 p-1 rounded inline-block">Đang ẩn (Tích vào ô vuông để hiện khi in)</div>}
                                            </div>
                                        )}
                                    </div>
                                </div>
                                
                                {/* Cột Tổng tiền */}
                                <div className={`w-full rounded-lg ${isPreviewMode ? 'w-1/2 pl-12 order-2 bg-transparent p-0' : 'md:w-1/2 md:pl-8 lg:pl-12 order-1 md:order-2 bg-sky-50 md:bg-transparent p-4 md:p-0'}`}>
                                    <div className={`flex justify-between items-center border-b ${isPreviewMode ? 'py-1 border-gray-100' : 'py-1.5 md:py-1 border-sky-100 md:border-gray-100'}`}><span className={`font-bold text-gray-700 ${isPreviewMode ? 'text-base' : 'text-sm md:text-base'}`}>Tổng giá trị:</span><span className={`font-bold ${isPreviewMode ? 'text-lg' : 'text-base md:text-lg'}`}>{formatCurrency(totals.subtotal)} đ</span></div>
                                    
                                    <div className={`flex justify-between items-center border-b ${isPreviewMode ? 'py-1 border-gray-100 text-sm' : 'py-1.5 md:py-1 border-sky-100 md:border-gray-100 text-xs md:text-sm'}`}>
                                        <span className="text-gray-600 flex items-center gap-2">Chiết khấu: {!isPreviewMode && <button className="ui-control bg-sky-200 md:bg-gray-200 px-1.5 py-0.5 rounded hover:bg-sky-300 shadow-sm" onClick={() => setData({...data, financials: {...data.financials, discountType: data.financials.discountType === 'amount' ? 'percent' : 'amount'}})}><Icons.RefreshCcw size={10}/> {data.financials.discountType === 'amount' ? 'Số tiền' : '%'}</button>}</span>
                                        <div className="flex items-center gap-1">{renderEditable(data.financials.discountType === 'amount' ? formatCurrency(data.financials.discountValue) : data.financials.discountValue, (e) => setData({...data, financials: {...data.financials, discountValue: parseInt(e.target.value.replace(/[^0-9]/g,''))||0}}), "0", `text-right text-red-500 font-bold bg-transparent ${isPreviewMode ? 'w-24' : 'w-20 md:w-24'}`)} <span className={`font-bold w-6 ${isPreviewMode ? 'text-xs' : 'text-[10px] md:text-xs'}`}>{data.financials.discountType === 'amount' ? 'đ' : '%'}</span></div>
                                    </div>
                                    {data.financials.discountType === 'percent' && <div className={`flex justify-end text-red-500 font-medium italic ${isPreviewMode ? 'text-[10px]' : 'text-[10px]'}`}>- {formatCurrency(totals.discount)} đ</div>}
                                    
                                    <div className={`flex justify-between items-center border-b mt-1 ${isPreviewMode ? 'py-1 border-gray-100' : 'py-1.5 md:py-1 border-sky-100 md:border-gray-100'}`}><span className={`font-bold text-gray-700 ${isPreviewMode ? 'text-sm' : 'text-xs md:text-sm'}`}>Giá sau chiết khấu:</span><span className={`font-bold text-sky-800 ${isPreviewMode ? 'text-base' : 'text-sm md:text-base'}`}>{formatCurrency(totals.subtotal - totals.discount)} đ</span></div>
                                    
                                    <div className={`flex justify-between items-center border-b ${isPreviewMode ? 'py-1 border-gray-100 text-sm' : 'py-1.5 md:py-1 border-sky-100 md:border-gray-100 text-xs md:text-sm'}`}>
                                        <span className="text-gray-600 flex items-center gap-2">Phí lắp đặt: {!isPreviewMode && <button className="ui-control bg-sky-200 md:bg-gray-200 px-1.5 py-0.5 rounded hover:bg-sky-300 shadow-sm" onClick={() => setData({...data, financials: {...data.financials, installationType: data.financials.installationType === 'amount' ? 'percent' : 'amount'}})}><Icons.RefreshCcw size={10}/> {data.financials.installationType === 'amount' ? 'Số tiền' : '%'}</button>}</span>
                                        <div className="flex items-center gap-1">{renderEditable(data.financials.installationType === 'amount' ? formatCurrency(data.financials.installationValue) : data.financials.installationValue, (e) => setData({...data, financials: {...data.financials, installationValue: parseInt(e.target.value.replace(/[^0-9]/g,''))||0}}), "0", `text-right font-medium bg-transparent ${isPreviewMode ? 'w-24' : 'w-20 md:w-24'}`)} <span className={`text-gray-500 w-6 ${isPreviewMode ? 'text-xs' : 'text-[10px] md:text-xs'}`}>{data.financials.installationType === 'amount' ? 'đ' : '%'}</span></div>
                                    </div>
                                    {data.financials.installationType === 'percent' && <div className={`flex justify-end text-gray-500 font-medium italic ${isPreviewMode ? 'text-[10px]' : 'text-[10px]'}`}>+ {formatCurrency(totals.install)} đ</div>}
                                    
                                    <div className={`flex justify-between items-center bg-sky-600 text-white rounded shadow-md ${isPreviewMode ? 'py-4 mt-3 px-5' : 'py-3 md:py-4 mt-3 px-4 md:px-5'}`}><span className={`font-bold uppercase tracking-wider ${isPreviewMode ? 'text-base' : 'text-sm md:text-base'}`}>Tổng Thanh Toán</span><span className={`font-black ${isPreviewMode ? 'text-2xl' : 'text-xl md:text-2xl'}`}>{formatCurrency(totals.total)} <span className={`font-medium ${isPreviewMode ? 'text-lg' : 'text-sm md:text-lg'}`}>VNĐ</span></span></div>
                                </div>
                            </div>
                            <div className="text-center text-[9px] md:text-[10px] text-gray-400 mt-6 md:mt-8 italic border-t border-gray-100 pt-3">Báo giá có giá trị 2 tuần - Aqara Smarthome</div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<QuoteTool />);
    </script>
</body>
</html>
